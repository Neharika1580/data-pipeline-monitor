name: Daily Pipeline Monitor

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests pandas sqlalchemy
      - run: python run.py
      - uses: actions/upload-artifact@v4
        with:
          name: pipeline-output
          path: |
            *.csv
            *.db